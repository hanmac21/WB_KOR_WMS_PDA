<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS 시스템</title>
    <link rel="stylesheet" th:href="@{/css/wms-common.css(v=${T(java.lang.System).currentTimeMillis()})}">
    <link rel="stylesheet" th:href="@{/css/common.css(v=${T(java.lang.System).currentTimeMillis()})}">
    <link rel="stylesheet" href="/css/index.css">
</head>
<body>
    <!-- 메인 컨테이너 -->
    <div id="app">
        <!-- 헤더 -->
        <div th:replace="fragments/header :: commonHeader(#{menu.header})"></div>

        <!-- 컨텐츠 영역 -->
        <div id="content" class="container">
            <div class="menu-grid">
                <button class="menu-item main-ulsan" onclick="checkNetworkAndMove('/menu-ulsan')">
                    <div class="menu-icon2">📦</div>
                    <span class="menu-text">울산</span>
                </button>
            </div>
            
            <!-- 현황 섹션 -->
            <div class="status-section" style="display: none;">
                <div class="status-header">
                    <span class="status-title"></span>
                    <div class="status-date">
                        <span class="date-nav">❮</span>
                        <span></span>
                        <span class="date-nav">❯</span>
                    </div>
                </div>

                <!-- 요약 통계 -->
                <div class="summary-stats">
                	<div class="stat-card green">
                        <div class="stat-header">
                            <div class="stat-label" th:text="#{table.labelCount}">Label Count</div>
                            <div class="stat-value"></div>
                        </div>
                        <div class="stat-content">
                            <div class="stat-icon">#</div>
                        </div>
                    </div>
                    <div class="stat-card blue">
                        <div class="stat-header">
                            <div class="stat-label"th:text="#{table.totalQty}">Total Qty</div>
                            <div class="stat-value"></div>
                        </div>
                        <div class="stat-content">
                            <div class="stat-icon">📦</div>
                        </div>
                    </div>
                </div>

                <!-- 업무별 현황 -->
                <div class="work-status-title" th:inline="text">
				  📈 [[#{table.overallStatus}]]
				</div>
				<div class="status-item status-item-header">
		            <div class="status-info">
		                <div class="status-indicator "></div>
		                <span class="status-name item-header"th:text="#{table.process}">Process</span>
		            </div>
		            <div class="status-numbers">
						<div class="count-section">
		                    <span class="status-count"><span class="status-value-count item-header" th:text="#{table.process.count}">Count</span></span>
		                </div>
		                <div class="qty-section">
		                    <span class="status-count"><span class="status-value-sum item-header" th:text="#{table.totalQty}">Total Qty</span></span>
		                </div>
		                
		            </div>
		        </div>
                <div class="status-list">
                    <!-- 동적으로 추가 -->
                </div>
            </div>
        </div>

        <!-- 푸터 -->
        <div class="footer">
            <div class="footer-text"><span id=info></span></div>
        </div>
    </div>

    <!-- 로딩 스피너 -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <div th:text = "#{info.loading}">로딩중...</div>
    </div>

    <!-- JavaScript -->
    <script th:src="@{/js/utils/common.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
    <script th:src="@{/js/index.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
    
    <script>
        // 현재 날짜 설정
     // 로딩 숨김
        hideLoading();
        window.addEventListener("pageshow", function(event) {
    	    hideLoading();
    	});
        
        function checkNetworkAndMove(url) {
    		showLoading();
    		if (window.AndroidInterface && !AndroidInterface.isNetworkConnected()) {
    		    AndroidInterface.showNoInternetDialog();
    		    hideLoading();
    		    return;
    		}
    		
    		if(url === '/menu-ulsan') {
    	        window.WMS.currentModule = 'ulsan';
    	        sessionStorage.setItem('currentModule', 'ulsan'); // sessionStorage 사용
    	        location.href = url;
    	    } else if(url === '/menu-sales') {
                window.WMS.currentModule = 'sales';
                sessionStorage.setItem('currentModule', 'sales');
                location.href = url;
            }
    	}
        
        const id = localStorage.getItem("savedid");
        $("#headerID").text(id).show();

        $(".back-btn").css("display","none");
        $(".btn_logOut").show();
        $(".header-title").css("margin-left","100px");  
    </script>
</body>
</html>
