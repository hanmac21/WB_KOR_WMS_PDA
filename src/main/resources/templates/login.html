<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS 시스템 로그인</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/common.css(v=${T(java.lang.System).currentTimeMillis()})}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <!-- 컨텐츠 영역 -->
    <div class="container">
        <!-- 로고 섹션 -->
        <div class="logo-section">
            <div class="logo-icon">
                <img src="/images/wb_logo.png" alt="회사 로고" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <span class="logo-text" style="display: none;">WMS</span>
            </div>
            <p class="system-subtitle">Warehouse Management System</p>
        </div>

        <!-- 에러 메시지 (토스트) -->
        <div id="errorMessage" class="error-message" th:text = "#{login.invalid}">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>

        <!-- 로그인 폼 -->
        <form id="loginForm" class="login-form" onsubmit="event.preventDefault(); login();">
            <!-- 공장 선택 -->
            <div class="factory-selection">
                <button type="button" class="selection-btn" data-factory="ULSAN">울산</button>
                <button type="button" class="selection-btn" data-factory="PT" style="display:none;">평택</button>
            </div>

            <!-- 언어 선택 -->
           <!-- <div class="language-selection">
                <div class="language-row">
                    <button type="button" class="language-btn" data-language="ko">
                        한국어
                    </button>
                    <button type="button" class="language-btn" data-language="en">
                        English
                    </button>
                </div>
            </div>
			-->
			<div class="credentials-section">
                <!-- 아이디 입력 -->
                <div class="form-group">
                    <label for="loginid" class="form-label">ID</label>               
                    <input type="text" id="loginid" name=loginid class="form-input"  
                           th:placeholder="#{login.id}" placeholder="아이디를 입력하세요">      
                </div>
                <!-- 비밀번호 입력 -->
                <div class="form-group">
                    <label for="loginpw" class="form-label">PW</label>
                    <input type="password" id="loginpw" name="loginpw" class="form-input"
                           th:placeholder="#{login.pw}" placeholder="비밀번호를 입력하세요">      
                </div>           
            </div>
            <div style="padding:5px; margin-bottom:13px;">
            	<input type = "checkbox" id = "saveid"><label style="padding:8px; ">아이디 저장</label>
            </div>          
            <button type="submit" id="loginBtn" class="login-btn">
                <span id="loadingSpinner" class="loading-spinner"></span>
                <span id="loginBtnText" th:text = "#{login.login}">로그인</span>
            </button>
        </form>
        
        <div class="update-minimal">
            <a href="https://kr.object.ncloudstorage.com/hanmacpds/wbmexwms.apk"> Version Update</a>
        </div>
    </div>

    <script>
    function downloadApk() {
        console.log('컨트롤러 통해 다운로드');
        window.location.href = '/download/app';
    }
    
    document.querySelector('.update-minimal a').addEventListener('click', function(e) {
    	window.open("http://food114.co.kr/appupdate/wbmexwms.apk", '_blank', 'noopener,noreferrer');
    })
        let selectedFactory = null;
        let selectedWarehouse = null;
        let selectedLanguage = null;

        // 공장/창고 선택 처리 (라디오 방식, 둘 중 하나만 선택)
        document.querySelectorAll('.selection-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // 기존 선택 해제
                document.querySelectorAll('.selection-btn').forEach(b => b.classList.remove('selected'));

                // 현재 버튼 선택
                this.classList.add('selected');

                // ULSAN 또는 PT
                selectedFactory = this.getAttribute('data-factory');

                // 즉시 저장 (언어 변경으로 리로드 되어도 복원 가능)
                localStorage.setItem('rememberedFactory', selectedFactory);

                console.log('선택된 공장:', selectedFactory);
            });
        });

        // 언어 선택 처리
        document.querySelectorAll('.language-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // 기존 선택 해제
                document.querySelectorAll('.language-btn').forEach(b => b.classList.remove('selected'));
                
                // 현재 버튼 선택
                this.classList.add('selected');
                selectedLanguage = this.getAttribute('data-language');
                
                console.log('선택된 언어:', selectedLanguage);
                
                // 언어 변경 시 페이지 새로고침 (URL 파라미터 추가)
                if (selectedLanguage) {
                    localStorage.setItem('rememberedLanguage', selectedLanguage);
                    if (selectedWarehouse === 'ILLINOIS') {
                        localStorage.setItem('rememberedWarehouse', 'ILLINOIS');
                    } else {
                        localStorage.removeItem('rememberedWarehouse');
                    }
                    window.location.href = '?lang=' + selectedLanguage;
                }
            });
        });

        function login(){
            // 공장 선택 검사
            if (!selectedFactory) {
                showError('공장을 선택해 주세요.');
                return;
            }
            
            if($("#loginid").val().trim()==''){
            	showError('아이디를 입력하세요');
            	return;
            }
            
            if($("#loginpw").val().trim()==''){
            	showError('비밀번호를 입력하세요');
            	return;
            }
            
            
            // 현재 세션용 데이터
            localStorage.setItem('rememberedFactory', selectedFactory);
            // localStorage.setItem('rememberedLanguage', selectedLanguage);
            sessionStorage.setItem('currentFactory', selectedFactory);
            // sessionStorage.setItem('currentLanguage', selectedLanguage);
            
            // 언어 파라미터 직접 생성
            // const langParam = selectedLanguage ? `?lang=${selectedLanguage}` : '';
            
           /* if(selectedFactory == 'Saltillo'){
                location.replace('/index' + langParam);
            } else {
            	//푸에블라 메뉴도 같은 메뉴로 이동
            	location.replace('/index' + langParam);
            	//location.replace('/puebla-menu' + langParam);
            } */
            
            // 로딩 상태 시작
            setLoadingState(true);
            hideError();
            
            if (!checkNetwork()){
                setLoadingState(false);
                return;
            }
            
            $.ajax({
                type:"POST",
                url:"/loginCheck",
                data:{
                    factory:selectedFactory,
                    loginid:$("#loginid").val(),
                    loginpw : $("#loginpw").val()
                },
                success:function(result){
                	console.log("result: "+result)
                    if(result == "success"){
                        // 선택 정보 저장
                        localStorage.setItem('rememberedFactory', selectedFactory);
                        // localStorage.setItem('rememberedLanguage', selectedLanguage);
                        const saveCheck = document.getElementById("saveid");
                        if (saveCheck.checked) {
                        	 localStorage.setItem('savedid', $("#loginid").val());
                             localStorage.setItem('savedpw', $("#loginpw").val());
                          } else {
                        	  localStorage.removeItem('savedid');
                        	  localStorage.removeItem('savedpw');
                          }
                        
                        // 현재 세션용 데이터
                        sessionStorage.setItem('currentFactory', selectedFactory);
                        // sessionStorage.setItem('currentLanguage', selectedLanguage);
                        
                        // URL 파라미터 유지해서 이동
                        location.replace('/index');
                    }else if(result == "idfail"){
                        showError('Invalid ID');
                    }else if(result == "pwfail"){
                    	showError('Incorrect password.');
                    }else{
                    	showError('Login Fail');
                    }
                    setLoadingState(false);
                },
                error:function(request,status, error){
                    console.log(error);
                    setLoadingState(false);
                    if(request.status==200){

                    }else if(request.status==500){
                        showError('처리도중 에러가 발생하였습니다.');
                    }else if(request.status==0){
                        showError('Wi-Fi 또는 데이터 연결이 없습니다.');
                    }else{
                        showError("code: " + request.status + " error: " + error);
                    }
                }
            });
        }

        // 로딩 상태 설정
        function setLoadingState(isLoading) {
            const loginBtn = document.getElementById('loginBtn');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const loginBtnText = document.getElementById('loginBtnText');
            
            if (isLoading) {
                loginBtn.disabled = true;
                loadingSpinner.style.display = 'inline-block';
                loginBtnText.textContent = '로그인 중...';
            } else {
                loginBtn.disabled = false;
                loadingSpinner.style.display = 'none';
                loginBtnText.textContent = 'Login';
            }
        }

        // 에러 메시지 표시 (토스트)
        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = message;
            errorElement.style.display = 'block';
            errorElement.style.animation = 'slideDown 0.5s ease';
            
            // 3초 후 자동 숨김
            setTimeout(() => {
                hideError();
            }, 3000);
        }

        // 에러 메시지 숨김
        function hideError() {
            const errorElement = document.getElementById('errorMessage');
            errorElement.style.animation = 'slideUp 0.3s ease';
            
            setTimeout(() => {
                errorElement.style.display = 'none';
            }, 3000);
        }

        // 페이지 로드 시 기억된 정보 복원
        document.addEventListener('DOMContentLoaded', function() {
            const rememberedFactory = localStorage.getItem('rememberedFactory');
            // const rememberedLanguage = localStorage.getItem('rememberedLanguage');
            const savedId = localStorage.getItem("savedid");		// 아이디 
            const savedPw = localStorage.getItem("savedpw");		// 비밀번호 
            if (savedId) {
              document.getElementById("loginid").value = savedId;
              document.getElementById("loginpw").value = savedPw;
              document.getElementById("saveid").checked = true;
            }

            // 저장된 공장이 PT이면 평택, 그 외에는 울산을 기본 선택
            const factoryToSet = rememberedFactory === 'PT' ? 'PT' : 'ULSAN';

            const factoryBtn = document.querySelector(
                `.selection-btn[data-factory="${factoryToSet}"]`
            );

            if (factoryBtn) {
                factoryBtn.classList.add('selected');
                selectedFactory = factoryToSet;
            }

            localStorage.setItem('rememberedFactory', selectedFactory);

            // // 기억된 언어 선택
            // let languageToSet = rememberedLanguage || "ko";   // 기본값 영어
		    // const languageBtn = document.querySelector(`[data-language="${languageToSet}"]`);
		    // if (languageBtn) {
		    //     languageBtn.classList.add('selected');
		    // }
            // selectedLanguage = languageToSet;
        });

        // 사용하지 않는 함수들 제거
        
        // checkNetwork 함수
        function checkNetwork() {
            if (!navigator.onLine) {
                showError('인터넷 연결을 확인해주세요.');
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
