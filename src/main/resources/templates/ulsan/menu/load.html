<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- <link rel="stylesheet" th:href="@{/css/header.css(v=${T(java.lang.System).currentTimeMillis()})}"> -->
<title>로그인</title>
<link rel="stylesheet" th:href="@{/css/common.css(v=${T(java.lang.System).currentTimeMillis()})}">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<style>
  </style>
</head>
<body>
	<div class= 'header-div'th:replace="fragments/header :: commonHeader(#{menu.load})"></div> 
	<div class="container">
        <!-- <div class="section-title" th:text = "#{menu.purchase.title}">구매 메뉴</div> -->
        <div class="menu-grid">
         	<button id="btn-transys-ga" class="sub-menu-item load" onclick="checkNetworkAndMove('/purchase/load/loadTransysGA')" >
                TRANSYS - GA
            </button>
            <button id="btn-transys-al" class="sub-menu-item load" onclick="checkNetworkAndMove('/purchase/load/loadTransysAL')" >
                TRANSYS - AL
            </button>
            <button id="btn-transys-il" class="sub-menu-item load" onclick="checkNetworkAndMove('/purchase/load/loadTransysIL')" >
                TRANSYS - IL
            </button>
            <button id="btn-lear" class="sub-menu-item load" onclick="checkNetworkAndMove('/purchase/load/loadLear')" >
                LEAR
            </button>
            <button id="btn-adient" class="sub-menu-item load" onclick="checkNetworkAndMove('/purchase/load/loadAdient')" >
                ADIENT
            </button>
            <button id="btn-load" class="sub-menu-item load" onclick="checkNetworkAndMove('/purchase/load/load')" th:text = "#{menu.load.load}">
                출고
            </button>
            <button id="btn-load-detail" class="sub-menu-item load" onclick="checkNetworkAndMove('/purchase/load/load-detail')" th:text = "#{menu.load.load.detail}">
                출고
            </button>
            <button id="btn-return" class="sub-menu-item load" onclick="checkNetworkAndMove('/purchase/load/return')" th:text = "#{menu.load.return}">
                출고 반품
            </button>
            <button id="btn-return-detail" class="sub-menu-item load" onclick="checkNetworkAndMove('/purchase/load/return-detail')" th:text = "#{menu.load.return.detail}">
                출고 반품 - detail
            </button>
        </div>
    </div>

    <!-- 푸터 -->
    <div class="footer">
        <div class="footer-text">WMS v1.0 | <span id="currentDate"></span></div>
    </div>
    
     <!-- 로딩 스피너 -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <div th:text= "#{info.loading}">로딩중...</div>
    </div>
    <script th:src="@{/js/utils/common.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
	<script>
	hideLoading();
	window.addEventListener("pageshow", function(event) {
	    hideLoading();
	});

	(function() {
	    var isIllinois = sessionStorage.getItem('currentWarehouse') === 'ILLINOIS';
	    var ilOnlyIds = ['btn-transys-il'];
	    var nonIlIds = ['btn-transys-ga', 'btn-transys-al', 'btn-lear', 'btn-adient', 'btn-load'];

	    if (isIllinois) {
	        nonIlIds.forEach(function(id) {
	            var el = document.getElementById(id);
	            if (el) el.style.display = 'none';
	        });
	    } else {
	        ilOnlyIds.forEach(function(id) {
	            var el = document.getElementById(id);
	            if (el) el.style.display = 'none';
	        });
	    }
	})();
	function checkNetworkAndMove(url) {
		showLoading();
		if (window.AndroidInterface && !AndroidInterface.isNetworkConnected()) {
		    AndroidInterface.showNoInternetDialog();
		    hideLoading();
		    return;
		}
		location.href = url;
	}
	</script>
</body>
</html>
