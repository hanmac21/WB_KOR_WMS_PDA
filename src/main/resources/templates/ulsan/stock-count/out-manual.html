<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인</title>
<link rel="stylesheet" th:href="@{/css/common.css(v=${T(java.lang.System).currentTimeMillis()})}">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<style>
    #itemLoading {
        position: absolute;
        right: 12px;
        top: 50%;
        width: 16px;
        height: 16px;
        min-width: 16px;
        min-height: 16px;
        max-width: 16px;
        max-height: 16px;
        margin: -8px 0 0 0;
        padding: 0;
        box-sizing: border-box;
        border: 2px solid #d1d5db;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: itemSpin 0.7s linear infinite;
        pointer-events: none;
        display: block;
        flex: 0 0 auto;
        align-self: center;
    }
    #itemLoading.hidden {
        display: none;
    }
    @keyframes itemSpin {
        to { transform: rotate(360deg); }
    }
    .ui-autocomplete {
        font-size: 13px;
    }
    .ui-autocomplete .ui-menu-item-wrapper {
        padding: 4px 8px;
        line-height: 1.3;
    }
</style>
</head>
<body data-page="addEntry">
	<div th:replace="fragments/header :: commonHeader('수기 입고 등록')"></div>
	<div class="form-container">
		<div class="section-header">
            <div class="datepicker-group">
               <span th:text = "#{search.inDate}">입고일 : </span><input type="text" id="datepicker"  autocomplete='off' placeholder="" readonly>
            </div>
            <div class="action-buttons">
                <button id="allCancelBtn" class="btn-action btn-cancel" onclick ="clearAll()" th:text = "#{btn.clearAll}">전체 취소</button>
            </div>
        </div>
		<div class="form-group">
			<div class = "storage-selector">
            	<span th:text="#{search.storage}">창고</span>
            	<select class="storage-select">
                    <!-- 동적으로 추가 -->
		        </select>
            </div>
            <div class="barcode-input" style="position: relative;">
                <span th:text="#{table.itemcode}">품번 : </span>
                <input type="text" id="itemInput" class="form-input keep-focus" th:placeholder="'품번을 입력하세요'" autocomplete="off">
                <span id="itemLoading" class="input-spinner hidden"></span>
            </div>
        </div>
	</div>
	<div class="form-container">
		<div class="table-header">
            <span class="item-count" th:utext="#{table.total(${count} ?: 0)}">총 <span id="count">0</span>건</span>
            <span class="item-count">총 수량 <span id="totalQty">0</span></span>
        </div>
        <div class="table-scroll-area">
            <table class="data-table">
                <thead>
                    <tr>
                        <th th:text="#{table.itemcode}">품번</th>
                        <th th:text="#{table.qty}">수량</th>
                        <th th:text="#{btn.delete}">삭제</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <!-- 동적으로 추가될 데이터 -->
                </tbody>
            </table>
        </div>
	</div>
    <!-- 푸터 -->
    <div class="footer">
        <button id="allSendBtn" class="btn-primary" onclick="saveEntry()" th:text="#{btn.saveBarcode}">전체 전송</button>
    </div>
     <!-- 로딩 스피너 -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <div th:text = "#{info.loading}">로딩중...</div>
    </div>
    <script th:src="@{/js/utils/common.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
    <script th:src="@{/js/modules/ulsan/incoming/manual.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
	<script>
	function checkNetworkAndMove(url) {
		if (window.AndroidInterface && !AndroidInterface.isNetworkConnected()) {
		    AndroidInterface.showNoInternetDialog();
		    return;
		}
		location.href = url;
	}
	// 현재페이지만 포커스 갈수 있게 수정
	['pointerdown', 'click', 'change'].forEach(ev => {
		  document.addEventListener(ev, function (e) {
		    if (e.target && e.target.closest('#memo')) {
		      // 문서 위임 핸들러(blur 스케줄러)까지 버블링 되지 않게 차단
		      e.stopPropagation();
		      // stopImmediatePropagation은 native 이벤트에선 의미 없음, jQuery 델리게이트까지 안 가는 게 핵심
		    }
		  }, true); // ← 캡처 단계에서 가로채기
		});
	</script>
</body>
</html>
