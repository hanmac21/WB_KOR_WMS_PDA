<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- <link rel="stylesheet" th:href="@{/css/header.css(v=${T(java.lang.System).currentTimeMillis()})}"> -->
<title>WMS 시스템</title>
<link rel="stylesheet" th:href="@{/css/common.css(v=${T(java.lang.System).currentTimeMillis()})}">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<style>
#datepicker{
	margin-right: 0;
}
.barcode-cell {
    word-break: break-all;
    white-space: pre-wrap;
    max-width: 150px;
    line-height: 1.2;
}

.clickable-row:hover {
    background-color: #f5f5f5;
}
.table-scroll-area {
    max-height: 450px; /* 스크롤 영역 높이 */
    overflow-y: auto;
}
.unpack-row{
	height:50px
}
  </style>
</head>
<body data-page="addEntry">
	<div th:replace="fragments/header :: commonHeader(#{menu.labelPrint.part.adjustment})"></div>
	<div class="form-container">
		<!-- <div class="datepicker-group">
			<span th:text="#{search.inDate}">입고일 : </span><input type="text"
				id="datepicker" autocomplete='off' placeholder="입고일" readonly>
		</div> -->
		<div class="form-group">
            <div class = "barcode-input">
            	<span th:text="#{search.barcode}">Barcode</span>
            	<input type="text"	id=barcodeInput class="form-input" th:placeholder="#{info.barcode.scan}"autocomplete="off">
		        <button id="scanBtn" class="scan-btn" onclick="addEntry()" th:text="#{btn.search}">검색</button>
            </div>
        </div>
	</div>
	<div class="form-container itemInfo-div">
		<div class="item-info-header">
			<div>
            	<div class="item-code"></div>
                <div class="item-name"></div>
            </div>
	    </div>
	    <div class="info-grid">
	        <div class="info-part">
	            <div class="info-label" th:text = "#{table.barcode}">Barcode</div>
	            <div class="info-value"><span id = "barcode"></span></div>
	        </div>
	      	<div class="info-part">
				<div class="info-label" th:text = "#{table.itemcode}">Item Code</div>
	            <div class="info-value"><span id = "itemcode"></span></div>
	        </div>
	        <div class="info-part">
	            <div class="info-label" th:text = "#{table.itemname}">Item Name</div>
	            <div class="info-value"><span id = "itemname"></span></div>
	        </div>
	        <div class="info-part">
	            <div class="info-label" th:text = "#{table.qty}">QTY</div>
	            <div class="info-value"><span id = "nowqty"></span></div>
	        </div>
		</div>
	</div>

	<div class="input-section">
		<div class="barcode-input">
         	<span th:text = "#{search.adjustmentqty}">조정 수량 </span>
			<input type="number" class="qty-input" id="adjustqty" value="0" min="0">
        </div>
		<div class="barcode-input">
			<span th:text = "#{search.memo}">메모 </span>
			<input type="text" id="memo" class="form-input"  autocomplete="off">
		</div>
         <div class="input-group">
         	<span></span>
         </div>
	</div>

    <!-- 푸터 -->
    <div class="footer">
        <button id="storageBtn" class="btn-primary" onclick="adjustment()" th:text="#{btn.saveBarcode}">저장</button>
    </div>
    <!-- 로딩 스피너 -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <div th:text = "#{info.loading}">로딩중...</div>
    </div>
    <script th:src="@{/js/utils/common.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
    <script	th:src="@{/js/modules/purchase/label/part_adjustment.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
	<script>
	const MSG_STORAGE_CHECK = "#{warning.barcode.storagecheck}";
	function checkNetworkAndMove(url) {
		if (window.AndroidInterface && !AndroidInterface.isNetworkConnected()) {
		    AndroidInterface.showNoInternetDialog();
		    return;
		}
		location.href = url;
	}

		// 현재페이지만 포커스 갈수 있게 수정
		['pointerdown', 'click', 'change'].forEach(ev => {
		  document.addEventListener(ev, function (e) {
		    if (e.target && (e.target.closest('#adjustqty') || e.target.closest('#memo') || e.target.closest('#adjustItemcode'))) {
		      // 문서 위임 핸들러(blur 스케줄러)까지 버블링 되지 않게 차단
		      e.stopPropagation();
		      // stopImmediatePropagation은 native 이벤트에선 의미 없음, jQuery 델리게이트까지 안 가는 게 핵심
		    }
		  }, true); // ← 캡처 단계에서 가로채기
		});
	</script>

</body>
</html>
