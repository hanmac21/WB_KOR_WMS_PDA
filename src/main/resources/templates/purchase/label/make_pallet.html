<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- <link rel="stylesheet" th:href="@{/css/header.css(v=${T(java.lang.System).currentTimeMillis()})}"> -->
<title>로그인</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link rel="stylesheet" th:href="@{/css/common.css(v=${T(java.lang.System).currentTimeMillis()})}">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<style>
.storage-selectArea{
	display:flex;
	align-items:center;
}
.storage-title{
    font-size: 13px;
    width: 66px;
    font-weight:500;
    color: #374151;
    margin-left: 2px;
}
.storage-select{
    background: #f3f4f6;
    cursor: pointer;
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    font-size: 14px;
    color: #374151;
    margin-bottom: 3px;
}
  </style>
</head>
<body data-page="addEntry">
	<div th:replace="fragments/header :: commonHeader(#{menu.labelPrint.makePallet})"></div> 
	<div class="form-container">
		<div class="section-header">
            <!-- <div class="section-title" th:text = "#{search.barcodeScan}">바코드 스캔</div> -->
            <div class="datepicker-group">
               <span th:text = "#{search.inDate}">입고일 : </span><input type="text" id="datepicker"  autocomplete='off' placeholder="" readonly>
            </div>
            <div class="action-buttons">
                <button id="allCancelBtn" class="btn-action btn-cancel" onclick ="clearAll()" th:text = "#{btn.clearAll}">전체 취소</button>
            </div>
        </div>
		<div class="form-group">
            <!-- <label class="form-label">자재 바코드</label> -->
            <!-- <div class="storage-selectArea">
            	<span th:text = "#{search.storage}" class="storage-title" name="storage-title">창고 : </span>
            	<select class="storage-select">
            		<option value="material" selected>Material</option>
            		<option value="sideseat">Side Seat</option>
            		<option value="outside">Outside</option>
            		<option value="fabric">Fabric</option>
            	</select> -->
            <!-- <div class = "storage-selector">
            	<span th:text="#{search.storage}">창고</span>
            	<select class="storage-select">
		           	<option th:each="item : ${factoryStorage}" th:value="${item}" th:text="${item}"
		           		th:selected="${#strings.equalsIgnoreCase(item, 'Material')}">
		           	</option>
		        </select>
            </div> -->
            <div class="barcode-input">
            <span th:text = "#{search.barcode}">바코드 : </span>
                <input type="text" id="barcodeInput" class="form-input" th:placeholder = "#{info.barcode.scan}" autocomplete="off">
                <button id="scanBtn" class="scan-btn" onclick = "addEntry()" th:text="#{btn.scan}">스캔</button>
            </div>
            <div class = "storage-selector">
            	<span th:text="#{search.storage}">창고</span>
            	<select class="storage-select">
            			<option value = 'Material'>Material</option>
						<option value = 'Fabric'>Fabric</option>
						<option value = 'Side seat'>Side seat</option>
						<option value = 'Outside'>Outside</option>
		           	<option th:each="item : ${factoryStorage}" th:value="${item}" th:text="${item}"
		           		th:selected="${#strings.equalsIgnoreCase(item, 'Material')}">
		           	</option>
		        </select>
            </div>
        </div>
	</div>
	<div class="form-container">
		<div class="table-header">
			<span class="item-count" th:utext="#{table.total(${count} ?: 0)}">총 <span id="count">0</span>건</span>
			<span class="item-count" th:utext="#{table.totalqty(${totalqty} ?: 0)}">TOTAL QTY <span id="totalqty"></span></span>
        </div>
        <div class="table-scroll-area">
            <table class="data-table">
                <thead>
                    <tr>
                        <th th:text = "#{table.itemCode}">품번</th>
                        <th th:text = "#{table.lot}">LOT</th>
                        <th th:text = "#{table.no}">순번</th>
                        <th th:text = "#{table.qty}">수량</th>
                        <th th:text = "#{btn.delete}">삭제</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <!-- 동적으로 추가될 데이터 -->
                </tbody>
            </table>
        </div>
	</div>
    <!-- 푸터 -->
    <div class="footer">
        <button id="allSendBtn" class="btn-primary" th:text = "#{btn.saveBarcode}" type="button">전체 전송</button>
    </div>
     <!-- 로딩 스피너 -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <div th:text="#{info.loading}">로딩중...</div>
    </div>
     <script th:src="@{/js/utils/common.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
    <script th:src="@{/js/modules/purchase/label/make_pallet.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
	<script>
	hideLoading();
	function checkNetworkAndMove(url) {
		if (window.AndroidInterface && !AndroidInterface.isNetworkConnected()) {
		    AndroidInterface.showNoInternetDialog();
		    return;
		}
		location.href = url;
	}
	</script>
</body>
</html>
