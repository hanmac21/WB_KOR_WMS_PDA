<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- <link rel="stylesheet" th:href="@{/css/header.css(v=${T(java.lang.System).currentTimeMillis()})}"> -->
<title>WMS 시스템</title>
<link rel="stylesheet" th:href="@{/css/common.css(v=${T(java.lang.System).currentTimeMillis()})}">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<style>
	/* 품번 선택 모달 */
	#itemSelectModal {
		display: none;
		position: fixed;
		top: 0;
		left: 0;
		width: 100%;
		height: 100%;
		background: rgba(0, 0, 0, 0.5);
		z-index: 9999;
		align-items: center;
		justify-content: center;
	}

	#itemSelectModal .modal-inner {
		background: #fff;
		border-radius: 8px;
		width: 90%;
		max-width: 500px;
		max-height: 70vh;
		display: flex;
		flex-direction: column;
		overflow: hidden;
	}

	#itemSelectModal .modal-header {
		padding: 14px 16px;
		font-weight: bold;
		font-size: 15px;
		border-bottom: 1px solid #ddd;
		display: flex;
		justify-content: space-between;
		align-items: center;
	}

	#itemSelectModal .modal-close {
		cursor: pointer;
		font-size: 20px;
	}

	#itemSelectModal .modal-body {
		overflow-y: auto;
	}

	#itemSelectModal table {
		width: 100%;
		border-collapse: collapse;
		font-size: 14px;
	}

	#itemSelectModal thead tr {
		background: #f5f5f5;
		position: sticky;
		top: 0;
	}

	#itemSelectModal th {
		padding: 10px 14px;
		text-align: left;
		border-bottom: 1px solid #ddd;
	}

	#itemSelectModal .item-modal-row {
		cursor: pointer;
	}

	#itemSelectModal .item-modal-row:hover {
		background: #f0f4ff;
	}

	#itemSelectModal .row-item {
		padding:10px 14px;
		border-bottom:1px solid #eee;
	}

	#itemSelectModal td {
		padding: 9px 9px;
		border-bottom: 1px solid #eee;
		font-size: 12px;
	}
  </style>
</head>
<body data-page="addEntry">
	<div th:replace="fragments/header :: commonHeader(#{menu.labelPrint.part.adjustment.itemcode})"></div>
	<div class="form-container">
		<div class="form-group">
            <div class = "barcode-input">
            	<span th:text="#{search.barcode}">Barcode</span>
            	<input type="text"	id=barcodeInput class="form-input" th:placeholder="#{info.barcode.scan}"autocomplete="off">
		        <button id="scanBtn" class="scan-btn" onclick="addEntry()" th:text="#{btn.search}">검색</button>
            </div>
        </div>
	</div>
	<div class="form-container itemInfo-div">
		<div class="item-info-header">
			<div>
            	<div class="item-code"></div>
                <div class="item-name"></div>
            </div>
	    </div>
	    <div class="info-grid">
	        <div class="info-part">
	            <div class="info-label" th:text = "#{table.barcode}">Barcode</div>
	            <div class="info-value"><span id = "barcode"></span></div>
	        </div>
	      	<div class="info-part">
				<div class="info-label" th:text = "#{table.itemcode}">Item Code</div>
	            <div class="info-value"><span id = "itemcode"></span></div>
	        </div>
	        <div class="info-part">
	            <div class="info-label" th:text = "#{table.itemname}">Item Name</div>
	            <div class="info-value"><span id = "itemname"></span></div>
	        </div>
	        <div class="info-part">
	            <div class="info-label" th:text = "#{table.qty}">QTY</div>
	            <div class="info-value"><span id = "nowqty"></span></div>
	        </div>
		</div>
	</div>

	<div class="input-section" style="height: 54%;">
		<div class="barcode-input">
			<span th:text = "#{table.itemcode}">메모 </span>
			<input type="text" id="adjustItemcode" class="form-input"  autocomplete="off">
			<button id="searchBtn" class="scan-btn" onclick="searchItemname()" th:text="#{btn.search}">검색</button>
		</div>
		<div class="barcode-input">
			<span th:text = "#{table.itemname}">메모 </span>
			<input type="text" id="adjustItemname" class="form-input"  autocomplete="off" readonly>
		</div>
		<div class="barcode-input">
			<span th:text = "#{search.memo}">메모 </span>
			<input type="text" id="memo" class="form-input"  autocomplete="off">
		</div>
         <div class="input-group">
         	<span></span>
         </div>
	</div>

    <!-- 푸터 -->
    <div class="footer">
        <button id="storageBtn" class="btn-primary" onclick="adjustment()" th:text="#{btn.saveBarcode}">저장</button>
    </div>

	<!-- 품번 선택 모달 -->
	<div id="itemSelectModal">
		<div class="modal-inner">
			<div class="modal-header">
				<span>품번 선택</span>
				<span id="closeItemModal" class="modal-close">&times;</span>
			</div>
			<div class="modal-body">
				<table>
					<thead>
					<tr>
						<th th:text = "#{table.itemcode}"></th>
						<th th:text = "#{table.itemname}"></th>
					</tr>
					</thead>
					<tbody id="itemSelecttbody"></tbody>
				</table>
			</div>
		</div>
	</div>

    <!-- 로딩 스피너 -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <div th:text = "#{info.loading}">로딩중...</div>
    </div>
    <script th:src="@{/js/utils/common.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
    <script	th:src="@{/js/modules/purchase/label/part_adjustment_itemcode.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
	<script>
	const MSG_STORAGE_CHECK = "#{warning.barcode.storagecheck}";
	function checkNetworkAndMove(url) {
		if (window.AndroidInterface && !AndroidInterface.isNetworkConnected()) {
		    AndroidInterface.showNoInternetDialog();
		    return;
		}
		location.href = url;
	}

		// 현재페이지만 포커스 갈수 있게 수정
		['pointerdown', 'click', 'change'].forEach(ev => {
		  document.addEventListener(ev, function (e) {
		    if (e.target && (e.target.closest('#adjustqty') || e.target.closest('#memo') || e.target.closest('#adjustItemcode'))) {
		      // 문서 위임 핸들러(blur 스케줄러)까지 버블링 되지 않게 차단
		      e.stopPropagation();
		      // stopImmediatePropagation은 native 이벤트에선 의미 없음, jQuery 델리게이트까지 안 가는 게 핵심
		    }
		  }, true); // ← 캡처 단계에서 가로채기
		});
	</script>

</body>
</html>
