<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link rel="stylesheet" th:href="@{/css/common.css(v=${T(java.lang.System).currentTimeMillis()})}">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<style>
.storage-select1, .storage-select2 {
    width: 87%;
    height: 5vh;
    padding: 6px;
    border: 1px solid lightgray;
}

/* 모달 닫기 버튼 */
.modal-close-btn {
    background: none;
    border: none;
    font-size: 28px;
    color: #6b7280;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 6px;
    line-height: 1;
}
.modal-close-btn:active { background: #e5e7eb; }

/* 모달 바디 스크롤 */
#storageMoveModal .modal-body {
    overflow-y: auto;
    padding: 12px 16px;
    max-height: 60vh;
}

/* 모달 푸터 */
.modal-footer {
    display: flex;
    gap: 10px;
    padding: 12px 16px;
    border-top: 1px solid #e5e7eb;
    flex-shrink: 0;
}
.modal-footer button {
    flex: 1;
    height: 48px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
.modal-footer button:first-child {
    background: #e5e7eb;
    color: #374151;
}
.modal-footer button:last-child {
    background: #2563eb;
    color: white;
}
.modal-footer button:active { opacity: 0.8; }

/* FIFO 섹션 */
.location-section {
    margin-bottom: 16px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    overflow: hidden;
}
.location-section .section-title {
    background: #f1f5f9;
    padding: 10px 14px;
    border-bottom: 1px solid #e5e7eb;
}
.location-section .info-row {
    display: flex;
    align-items: center;
    gap: 8px;
}
.location-section .info-label {
    font-size: 13px;
    color: #6b7280;
    white-space: nowrap;
}
.location-section .info-value {
    font-size: 15px;
    font-weight: 700;
    color: #1f2937;
}

/* FIFO 테이블 */
.location-table-wrapper {
    overflow-x: auto;
}
.location-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}
.location-table th {
    background: #374151;
    color: white;
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    white-space: nowrap;
}
.location-table td {
    padding: 10px 12px;
    border-bottom: 1px solid #f3f4f6;
    color: #374151;
}
.location-table .td-barcode {
    width: 55%;
    word-break: break-all;
    font-size: 13px;
}
.location-table .td-date {
    width: 25%;
    white-space: nowrap;
    font-size: 14px;
}
.location-table tr:last-child td { border-bottom: none; }
.location-table tr:nth-child(even) td { background: #f9fafb; }
.location-table .ta-right { text-align: right; font-weight: 600; }

.empty { text-align: center; padding: 30px; color: #9ca3af; font-size: 15px; }
</style>
</head>
<body data-page="addEntry">
	<div th:replace="fragments/header :: commonHeader(#{menu.movement.warehouse})"></div> 
	<div class="form-container">
		<div class="section-header">
            <div class="datepicker-group">
               <span th:text = "#{search.inDate}">입고일 : </span><input type="text" id="datepicker"  autocomplete='off' placeholder="" readonly>
            </div>
            <div class="action-buttons">
                <button id="allCancelBtn" class="btn-action btn-cancel" onclick ="clearAll()" th:text = "#{btn.clearAll}">전체 취소</button>
            </div>
        </div>
		<div class="form-group">
            <div class="barcode-input">
            <span th:text = "#{search.barcode}">바코드 : </span>
                <input type="text" id="barcodeInput" class="form-input" th:placeholder = "#{info.barcode.scan}" autocomplete="off">
                <button id="scanBtn" class="scan-btn" onclick = "addEntry()" th:text="#{btn.scan}">스캔</button>
            </div>
	        <div class = "storage-selector">
            	<span >OUT</span>
            	<select class="storage-select storage-select1">

		        </select>
            </div>
             <div class = "storage-selector">
            	<span >IN</span>
            	<select class="storage-select storage-select2">

		        </select>
            </div>
        </div>
	</div>
	<div class="form-container">
		<div class="table-header">
			<span class="item-count" th:utext="#{table.total(${count} ?: 0)}">총 <span id="count">0</span>건</span>
        </div>
        <div class="table-scroll-area">
            <table class="data-table">
                <thead>
                    <tr>
                        <th th:text = "#{table.itemCode}">품번</th>
                        <th th:text = "#{table.indate}">입고일</th>
                        <th th:text = "#{table.qty}">수량</th>
                        <th th:text = "#{table.no}">순번</th>
                        <th th:text = "#{btn.delete}">삭제</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <!-- 동적으로 추가될 데이터 -->
                </tbody>
            </table>
        </div>
	</div>	
    <!-- 푸터 -->
    <div class="footer">
        <button id="allSendBtn" class="btn-primary" onclick = "saveBarcode()" th:text = "#{btn.saveBarcode}">전체 전송</button>
    </div>
    <!-- 제품 위치 모달창 HTML -->
    <div id="storageMoveModal" class="modal-overlay" style="display: none;">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title">FIFO Item Info</h3>
                <button class="modal-close-btn" onclick="closestorageMoveModal()">&times;</button>
            </div>

            <div class="modal-body">
                <!-- 제품 기본 정보 -->

                <!-- 위치별 재고 현황 -->
                <div id="fifoContainer"></div>

            </div>
            <div class="modal-footer">
                <button class="btn-modal-close" onclick="closestorageMoveModal()">Cancel</button>
                <button class="btn-modal-close" onclick="doTransferWarehouse()">Confirm</button>
            </div>
        </div>

     <!-- 로딩 스피너 -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <div th:text="#{info.loading}">로딩중...</div>
    </div>
     <script th:src="@{/js/utils/common.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
    <script th:src="@{/js/modules/purchase/movement/warehouse.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
	<script>
	hideLoading();
	function checkNetworkAndMove(url) {
		if (window.AndroidInterface && !AndroidInterface.isNetworkConnected()) {
		    AndroidInterface.showNoInternetDialog();
		    return;
		}
		location.href = url;
	}
	</script>
	<script th:inline="javascript">		// 접속하는 대메뉴에 따라 헤더바꾸기위해 필요함 타임리프에서 설정하고 js에서 추가 설정
	window.I18N = Object.assign(window.I18N || {}, {
	    "menu.aunde.move": /*[[#{menu.aunde.move}]]*/ ""
	  });
	</script>
</body>
</html>
