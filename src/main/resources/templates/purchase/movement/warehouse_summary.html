<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인</title>
<link rel="stylesheet" th:href="@{/css/common.css(v=${T(java.lang.System).currentTimeMillis()})}">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<style>
.table-scroll-area {
    max-height: 450px; /* 스크롤 영역 높이 */
    overflow-y: auto;
}
  </style>
</head>
<body data-page="addEntry">
	<div th:replace="fragments/header :: commonHeader(#{menu.movement.warehouse.summary})"></div> 
	<div class="form-container">
		<div class="section-header">
            <div class="datepicker-group">
               <span th:text = "#{search.inDate}">입고일 : </span>
               <input type="text" id="datepicker"  autocomplete='off' placeholder="" readonly>
            </div>
            <div class="action-buttons">
                <button id="scanBtn" class="scan-btn" onclick="search()" th:text="#{btn.search}">검색</button>
            </div>
        </div>
        <div class="form-group">
			 <div class="location-selector">
				 <div class="location-main-selectors">
					<select id="locationPart1" class="location-select">
						<option value = "WBTA">WBTA</option>
					</select>  
					<select id="locationPart2" class="location-select storage-select">
						<option value = 'MATERIAL'>MATERIAL</option>
						<option value = 'PRODUCT'>PRODUCT</option>
					</select> 
				</div>
			</div>
		</div>
	</div>
	<div class="form-container">
		<div class="table-header">
			<span class="item-count" th:utext="#{table.total(${count} ?: 0)}">총 <span id="count">0</span>건</span>
			<span class="item-count" th:utext="#{table.totalqty(${totalqty} ?: 0)}">TOTAL QTY <span id="totalqty"></span></span>
        </div>
        <div class="table-scroll-area">
            <table class="data-table">
                <thead>
                    <tr>
                        <th th:text ="#{table.indate}">indate</th>
                    	<th th:text ="#{table.factory}">factory</th>
                    	<th th:text ="#{table.storage}">storage</th>
                    	<th th:text ="#{table.itemcode}">itemcode</th>
                    	<th th:text ="#{table.sumqty}">sumqty</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <!-- 동적으로 추가될 데이터 -->
                </tbody>
            </table>
        </div>
	</div>
     <!-- 로딩 스피너 -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <div th:text="#{info.loading}">로딩중...</div>
    </div>
     <script th:src="@{/js/utils/common.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
    <script th:src="@{/js/modules/purchase/movement/warehouse_summary.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
	<script>
	function checkNetworkAndMove(url) {
		if (window.AndroidInterface && !AndroidInterface.isNetworkConnected()) {
		    AndroidInterface.showNoInternetDialog();
		    return;
		}
		location.href = url;
	}
	</script>
	<script th:inline="javascript">		// 접속하는 대메뉴에 따라 헤더바꾸기위해 필요함 타임리프에서 설정하고 js에서 추가 설정
	window.I18N = Object.assign(window.I18N || {}, {
	    "menu.aunde.move.summary": /*[[#{menu.aunde.move.summary}]]*/ ""
	  });
	</script>
</body>
</html>
