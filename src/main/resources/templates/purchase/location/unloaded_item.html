<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인</title>
<link rel="stylesheet" th:href="@{/css/common.css(v=${T(java.lang.System).currentTimeMillis()})}">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<!-- CSS 관련된건 나중에 너무 길어지면 파일로 따로 빼겟습니다 (지웅) -->
<style>
	.location-table th {
		background: #f1f5f9;
		color: #374151;
		font-weight: 600;
		padding: 12px 10px;
		text-align: center;
		border-bottom: 1px solid #e5e7eb;
	}

	.location-table td {
		padding: 12px 10px;
		text-align: center;
		border-bottom: 1px solid #f1f5f9;
		color: #374151;
	}

	.location-table tbody tr:hover {
		background: #f8fafc;
	}

	.location-table tbody tr:last-child td {
		border-bottom: none;
	}


	.form-container input {
		height: 30px;
		padding: 8px 10px;
		border: 1px solid #d1d5db;
		border-radius: 4px;
		font-size: 14px;
		background: #f9fafb;
		color: #374151;
		text-align: center;
	}


	.form-container input:focus {
		outline: none;
		border-color: #3b82f6;
		background: white;
	}

	.location-selector {
		display: flex;
		flex-direction: column;
		gap: 10px;
		width: 100%;
		max-width: 500px;
	}

	/* 상단 Factory, Storage 큰 select 박스들 */
	.location-main-selectors {
		width:100%;
		gap: 10px;
		margin-bottom:5px;
	}

	.location-select {
		width: 60px;
		padding: 8px 5px;
		border: 1px solid #ddd;
		border-radius: 4px;
		background-color: white;
		font-size: 12px;
		color: #333;
		cursor: pointer;
		text-align: center;
	}

	.location-select:focus {
		outline: none;
		border-color: #007bff;
		box-shadow: 0 0 0 1px rgba(0, 123, 255, 0.1);
	}

	/* 반응형 디자인 */
	@media (max-width: 768px) {
		.location-main-selectors {
			flex-direction: column;
			gap: 5px;
		}

		.location-select {
			width: 45px;
			padding: 6px 2px;
			font-size: 11px;
		}
	}

	#dataTableBody > tr> td:nth-child(2){
		white-space: nowrap;
	}

	/* 모바일 대응 */
	@media (max-width: 480px) {
		.location-table th,
		.location-table td {
			padding: 10px 8px;
			font-size: 13px;
		}

		.form-container > div {
			gap: 6px;
		}

		.location-selector {
			gap: 2px;
			padding: 6px;
		}

		.location-select {
			height: 40px;
			font-size: 11px;
			padding: 4px 6px;
		}

		#locationPart1,
		#locationPart2 {
			width:49%;
			height:40px;
			font-size:18px;
		}
	}

	.form-group {
		margin-bottom: -8px;
	}
	.table-scroll-area {
		max-height: 430px;
		overflow-y: auto;
	}

	.table-header {
		background: #f8fafc;
		padding: 7px 15px;
		border-bottom: 1px solid #e5e7eb;
		position: sticky;
		top: 0;
		z-index: 10;
	}
</style>
</head>
<body data-page="addEntry">
	<div th:replace="fragments/header :: commonHeader(#{menu.location.status.unloaded})"></div>
	
	<div class= "form-container location-div">
		<div class="form-group">
			<div class="location-selector">
				 <div class="location-main-selectors">
					<select id="locationPart1" class="location-select">
						<option value = 'WBTA'>WBTA</option>
					</select>
					<select id="locationPart2" class="location-select">
						<option value = 'MATERIAL'>MATERIAL</option>
						<option value = 'PRODUCT'>PRODUCT</option>
					</select>
				</div>
			</div>
		</div>
	</div>
	<div class="form-container">
		<div class="table-header">
			<span class="item-count" th:utext="#{table.total(${count} ?: 0)}">총 <span id="count">0</span>건</span>
			<span class="item-count" th:utext="#{table.totalqty(${totalqty} ?: 0)}">TOTAL QTY <span id="totalqty"></span></span>
        </div>
        <div class="table-scroll-area">
            <table class="data-table">
                <thead>
                    <tr>
                        <th th:text = "#{table.no}">순번</th>
                        <th th:text = "#{table.indate}">indate</th>
                        <th th:text = "#{table.itemcode}">itemcode</th>
                        <th th:text = "#{table.qty}">qty</th>
                        <th th:text = "#{table.barcode}">barcode</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <!-- 동적으로 추가될 데이터 -->
                </tbody>
            </table>
        </div>
	</div>

	<div class="footer">
    </div>
	
	<!-- 로딩 스피너 -->
	<div id="loading" class="loading hidden">
		<div class="spinner"></div>
		<div th:text="#{info.loading}">로딩중...</div>
	</div>
	<script
		th:src="@{/js/utils/common.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
	<script
		th:src="@{/js/modules/purchase/location/unloaded.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
	<script>
	function checkNetworkAndMove(url) {
		if (window.AndroidInterface && !AndroidInterface.isNetworkConnected()) {
		    AndroidInterface.showNoInternetDialog();
		    return;
		}
		location.href = url;
	}

	</script>
</body>
</html>
