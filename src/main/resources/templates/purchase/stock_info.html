<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- <link rel="stylesheet" th:href="@{/css/header.css(v=${T(java.lang.System).currentTimeMillis()})}"> -->
<title>Stock Info</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link rel="stylesheet" th:href="@{/css/common.css(v=${T(java.lang.System).currentTimeMillis()})}">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<style>
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.modal-container {
    background: white;
    border-radius: 8px;
    width: 90%;
    max-width: 500px;
    max-height: 80vh;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
}

.modal-header {
    background: #333;
    color: white;
    display: flex;
    padding: 20px;
    border-bottom: 1px solid #e5e5e5;
    position: relative;
    flex-shrink: 0;
}

.modal-title {
    font-size: 18px;
    font-weight: 600;
    color: white;
}

.close-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 4px;
}

.top-section {
    padding: 20px;
    border-bottom: 1px solid #eee;
}

.date-info { 
    margin-bottom: 15px; 
    font-size: 14px; 
    color: #666; 
    display: flex; 
    justify-content: space-between; /* 양쪽 끝으로 정렬 */
    align-items: center;
    /* gap과 divider 관련 스타일 제거 */
}
.date-info .date-left {
    color: #333; 
    font-weight: 500;
}

.date-info .count-right {
    color: #333; 
    font-weight: 500;
}

.pallet-label {
    background: #f9f9f9;
    padding: 10px;
    border-radius: 4px;
    border-left: 3px solid #333;
}

.pallet-title {
    font-size: 12px;
    color: #666;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.pallet-barcode {
    font-size: 14px;
    color: #333;
    word-break: break-all;
}

.barcode-title {
    background: #f0f0f0;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    color: #333;
    text-align: center;
    letter-spacing: 0.5px;
}

.bottom-section {
    max-height: 300px;
    overflow-y: auto;
}

.bottom-section::-webkit-scrollbar {
    width: 6px;
}

.bottom-section::-webkit-scrollbar-track {
    background: #f0f0f0;
}

.bottom-section::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 3px;
}

.parts-table {
    width: 100%;
    border-collapse: collapse;
}

.parts-table tbody tr:nth-child(even) {
    background: #fafafa;
}

.parts-table tbody tr:hover {
    background: #f0f0f0;
}

.part-barcode {
    font-size: 13px;
    color: #333;
    padding: 12px 20px;
    border-bottom: 1px solid #eee;
    word-break: break-all;
}

.table1{
	height:50px;
}
@media (max-width: 768px) {
    .modal-container {
        width: 95%;
    }
    
    .modal-header,
    .top-section,
    .part-barcode {
        padding-left: 13px;
        padding-right: 13px;
    }
    
    .pallet-barcode,
    .part-barcode {
        font-size: 12px;
    }
}
</style>
</head>
<body data-page="addEntry stock-info">
	<div th:replace="fragments/header :: commonHeader(#{menu.stockInfo})"></div> 
	<div class="form-container">
		<div class="form-group">
            <div class="barcode-input">
            <span th:text = "#{search.barcode}">바코드 : </span>
                <input type="text" id="barcodeInput" class="form-input" th:placeholder = "#{info.barcode.scan}" autocomplete="off">
                <button id="scanBtn" class="scan-btn" onclick = "addEntry()" th:text="#{btn.scan}">스캔</button>
            </div>
        </div>
	</div>
	<div class="form-container">
		<div class="table-header">
			<span id ="locationMatin"></span>
        </div>
        <div class="table-scroll-area">
            <table class="data-table">
                <thead id="dataTableHead">
                    <!-- 동적으로 추가될 데이터 -->
                </thead>
                <tbody id="dataTableBody">
                    <!-- 동적으로 추가될 데이터 -->
                </tbody>
            </table>
        </div>
    </div>
	<div class="form-container">
        <div class="detail-section-info" style="display:none;">
        	<div class="table-header">
				<span class="item-count" th:utext="#{table.total(${count} ?: 0)}">총 <span id="count">0</span>건</span>	
				<span class="item-count" th:utext="#{table.totalqty(${totalqty} ?: 0)}">TOTAL QTY <span id="totalqty"></span></span>
	        </div>
			<!-- <div class="detail-header">
				<h3 class="detail-title"></h3>
			</div> -->
   
			<div class="detail-table-container-info">
				<div class="table-scroll-area">
					<table class="detail-table">
						<thead>
							<tr>
			                    <th th:text = "#{table.date}">INDATE</th>
			                    <th th:text = "#{table.qty}">QTY</th>
			                    <th th:text = "#{table.location}">LOCATION</th>
			                    <!-- <th>LOTDATE</th> -->
			                </tr>
	            		</thead>
	            		<tbody id="detailDataBody">
	            		</tbody>
	       			</table>
       			</div>
		    </div>
		</div>
	</div>
	
	<!-- 모달 -->
    <div id="modalOverlay" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-container">
        
            <div class="modal-header">
                <h2 class="modal-title" th:text = "#{title.modal.barcodeInfo}">Barcode Info</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <div class="top-section">
				<div class="date-info">
				    <span class="date-left">Made Date : <span class="date"></span></span>
				    <span class="count-right">Count : <span class="count">0</span></span>
				</div>
                <div class="pallet-label">
                	<div class="pallet-title">Pallet</div>
                    <div class="pallet-barcode"></div>
   	            </div>
            </div>

			<div class="barcode-title" th:text = "#{table.barcode}">BARCODE</div>

            <div class="bottom-section">
                <table class="parts-table">				    
				    <tbody class="partsTableBody">
				    </tbody>
				</table>
            </div>
        </div>
    </div>
	
	
    <!-- 푸터 -->
    <!-- <div class="footer">
        <div class="footer-text">WMS v1.0 | <span id="currentDate"></span></div>
    </div> -->
     <!-- 로딩 스피너 -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <div th:text="#{info.loading}">로딩중...</div>
    </div>
     <script th:src="@{/js/utils/common.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
    <script th:src="@{/js/modules/purchase/pur_stock_info.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
	<script>
	hideLoading();
	function checkNetworkAndMove(url) {
		if (window.AndroidInterface && !AndroidInterface.isNetworkConnected()) {
		    AndroidInterface.showNoInternetDialog();
		    return;
		}
		location.href = url;
	}
	
	// 현재페이지만 포커스 갈수 있게 수정
	['pointerdown', 'click', 'change'].forEach(ev => {
		  document.addEventListener(ev, function (e) {
		    if (e.target && e.target.closest('#barcodeInput')) {
		      // 문서 위임 핸들러(blur 스케줄러)까지 버블링 되지 않게 차단
		      e.stopPropagation();
		      // stopImmediatePropagation은 native 이벤트에선 의미 없음, jQuery 델리게이트까지 안 가는 게 핵심
		    }
		  }, true); // ← 캡처 단계에서 가로채기
		});
	</script>
</body>
</html>
