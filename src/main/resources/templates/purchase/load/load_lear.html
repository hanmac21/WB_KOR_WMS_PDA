<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="stylesheet" th:href="@{/css/header.css(v=${T(java.lang.System).currentTimeMillis()})}"> -->
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/common.css(v=${T(java.lang.System).currentTimeMillis()})}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <style>
        body[data-page="addEntry"] {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
        }
        body[data-page="addEntry"] .table-form-container {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 55px;
        }
        body[data-page="addEntry"] .table-form-container .table-scroll-area {
            flex: 1;
            overflow-y: auto;
            max-height: none;
        }
        #invoiceInfoContainer {
            padding: 0;
            overflow: hidden;
        }
        .invoice-header {
            background: #1e3a8a;
            color: white;
            padding: 7px 14px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .invoice-body {
            padding: 10px 14px;
        }
        .invoice-manifest {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            margin-bottom: 8px;
            border-bottom: 1px solid #e2e8f0;
        }
        .invoice-manifest .label {
            font-size: 12px;
            color: #6b7280;
            font-weight: 600;
        }
        .invoice-manifest .value {
            font-size: 12px;
            color: #1e3a8a;
            font-weight: bold;
        }
        .invoice-stats {
            display: flex;
            gap: 8px;
        }
        .invoice-stat-card {
            flex: 1;
            background: #f1f5f9;
            border-radius: 6px;
            padding: 6px 10px;
            text-align: center;
        }
        .invoice-stat-card .stat-label {
            font-size: 11px;
            color: #6b7280;
            margin-bottom: 2px;
        }
        .invoice-stat-card .stat-value {
            font-size: 15px;
            font-weight: bold;
            color: #1e3a8a;
        }
    </style>
</head>
<body data-page="addEntry">
    <div th:replace="fragments/header :: commonHeader('LEAR')"></div>
    <div class="form-container">
        <div class="section-header">
            <div class="action-buttons">

            </div>
        </div>
        <div class="form-group">
            <div class="datepicker-group">
                <span th:text="#{search.outDate}">출고일 : </span><input type="text" id="datepicker" autocomplete='off' placeholder="" readonly>
                <button id="allCancelBtn" class="btn-action btn-cancel" onclick="clearAll()" th:text="#{btn.clearAll}">전체
                    취소
                </button>
            </div>
            <div class="storage-selector">
                <span th:text="#{search.storage}">창고</span>
                <select class="storage-select">
                </select>
            </div>
            <div class="storage-selector">
                <span th:text="#{search.shipTo}">출고처</span>
                <select class="shipto-select">
                    <option value = "LEAR">LEAR</option>
                </select>
            </div>
            <div class="barcode-input">
                <span th:text="#{search.barcode}">바코드 : </span>
                <input type="text" id="barcodeInput" class="form-input" th:placeholder="#{info.barcode.scan}"
                       autocomplete="off">
                <button id="scanBtn" class="scan-btn" onclick="addEntry()">스캔</button>
            </div>
        </div>
    </div>
    <div class="form-container" id="invoiceInfoContainer">
        <div class="invoice-body">
            <div class="invoice-manifest">
                <span class="label">Manifest No</span>
                <span class="value" id="invoiceManifestNo">-</span>
            </div>
            <div class="invoice-stats">
                <div class="invoice-stat-card">
                    <div class="stat-label">Item Qty</div>
                    <div class="stat-value" id="invoiceTotalBox">-</div>
                </div>
                <div class="invoice-stat-card">
                    <div class="stat-label">Total Qty</div>
                    <div class="stat-value" id="invoiceTotalQty">-</div>
                </div>
            </div>
        </div>
    </div>
    <div class="form-container table-form-container">
        <!--<div class="table-header">
            <span class="item-count" th:utext="#{table.total(${count} ?: 0)}">총 <span id="count">0</span>건</span>
        </div>-->
        <div class="table-scroll-area">
            <table class="data-table">
                <thead>
                <tr>
                    <th th:text="#{table.itemCode}">품번</th>
                    <th th:text="#{table.qty}">수량</th>
                </tr>
                </thead>
                <tbody id="dataTableBody">
                <!-- 동적으로 추가될 데이터 -->
                </tbody>
            </table>
        </div>
    </div>
    <!-- 푸터 -->
    <div class="footer">
        <button id="allSendBtn" class="btn-primary" onclick="saveBarcode()" th:text="#{btn.saveBarcode}">전체 전송</button>
    </div>
    <!-- 바코드 목록 모달 -->
    <div id="barcodeListModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <span class="modal-title" id="barcodeModalTitle"></span>
                <button class="modal-close" onclick="closeBarcodeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div style="overflow-y:auto; max-height:55vh; padding:8px;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Serial</th>
                                <th>Qty</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="barcodeModalBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <!-- 로딩 스피너 -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <div th:text="#{info.loading}">로딩중...</div>
    </div>
    <script th:src="@{/js/utils/common.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
    <script th:src="@{/js/modules/purchase/load/load_lear.js(v=${T(java.lang.System).currentTimeMillis()})}"></script>
    <script>
        function checkNetworkAndMove(url) {
            if (window.AndroidInterface && !AndroidInterface.isNetworkConnected()) {
                AndroidInterface.showNoInternetDialog();
                return;
            }
            location.href = url;
        }
    </script>
</body>
</html>
